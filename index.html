<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo App</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: #f4f6f9;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .container {
        width: 400px;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.15);
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    .input-group {
        display: flex;
        gap: 10px;
    }

    input {
        flex: 1;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 16px;
    }

    button {
        padding: 12px 18px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }

    .add-btn {
        background: #4CAF50;
        color: white;
    }

    ul {
        list-style: none;
        margin-top: 20px;
    }

    li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px;
        margin-bottom: 10px;
        background: #f8f8f8;
        border-radius: 6px;
    }

    .task {
        cursor: pointer;
        flex: 1;
    }

    .completed {
        text-decoration: line-through;
        color: gray;
    }

    .delete-btn {
        background: #e53935;
        color: white;
        margin-left: 10px;
    }
</style>
</head>
<body>

<div class="container">
    <h1>📝 Todo App</h1>

    <div class="input-group">
        <input
            type="text"
            id="taskInput"
            placeholder="Enter a task..."
        >
        <button class="add-btn" onclick="addTask()">
            Add
        </button>
    </div>

    <ul id="taskList"></ul>
</div>

<script>
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

    function saveTasks() {
        localStorage.setItem(
            "tasks",
            JSON.stringify(tasks)
        );
    }

    function renderTasks() {
        const taskList =
            document.getElementById("taskList");

        taskList.innerHTML = "";

        tasks.forEach((task, index) => {
            const li =
                document.createElement("li");

            li.innerHTML = `
                <span
                    class="task ${task.completed ? "completed" : ""}"
                    onclick="toggleTask(${index})"
                >
                    ${task.text}
                </span>

                <button
                    class="delete-btn"
                    onclick="deleteTask(${index})"
                >
                    Delete
                </button>
            `;

            taskList.appendChild(li);
        });
    }

    function addTask() {
        const input =
            document.getElementById("taskInput");

        const text =
            input.value.trim();

        if (text === "") return;

        tasks.push({
            text,
            completed: false
        });

        saveTasks();
        renderTasks();

        input.value = "";
    }

    function toggleTask(index) {
        tasks[index].completed =
            !tasks[index].completed;

        saveTasks();
        renderTasks();
    }

    function deleteTask(index) {
        tasks.splice(index, 1);

        saveTasks();
        renderTasks();
    }

    document
        .getElementById("taskInput")
        .addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                addTask();
            }
        });

    renderTasks();
</script>

</body>
</html>
